<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>OfferBazar | Loot Zone, Coupon Deals & Best Offers in India</title>
    <meta name="description" content="OfferBazar.xyz: India's #1 destination for extreme Loot deals, 1 Rs offers, and verified Coupon Deals. Grab Zomato, Dominos coupons & electronics at unbelievable prices." />
    <meta name="keywords" content="OfferBazar, offerbazar.xyz, loot zone india, coupon deals india, best offers india, 1 rs deals, zomato coupons, dominos coupons, flash loot, budget shopping india, online deals site" />
    <meta name="author" content="OfferBazar Team" />
    
    <!-- Geo Tags for India SEO -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="geo.position" content="20.593684;78.96288" />
    <meta name="ICBM" content="20.593684, 78.96288" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://offerbazar.xyz/" />
    <meta property="og:title" content="OfferBazar | Loot Zone & Verified Coupon Deals" />
    <meta property="og:description" content="India's best loot deal platform. Get iPhone for 1 Rs, Laptop price errors, and thousands of verified coupons." />
    <meta property="og:image" content="/logo.jpeg" />

    <!-- Structured Data (Schema.org) for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OfferBazar",
      "url": "https://offerbazar.xyz/",
      "logo": "https://offerbazar.xyz/logo.jpeg",
      "description": "India's leading platform for extreme loot deals, verified coupons, and curated best offers.",
      "sameAs": [
        "https://twitter.com/offerbazar",
        "https://instagram.com/offerbazar"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OfferBazar",
      "url": "https://offerbazar.xyz/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://offerbazar.xyz/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://offerbazar.xyz/" />
    <meta property="twitter:title" content="OfferBazar | Best Loot & Coupon Deals India" />
    <meta property="twitter:description" content="Extreme savings on OfferBazar.xyz. Loot deals and verified coupons updated every hour." />
    <meta property="twitter:image" content="/logo.jpeg" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Outfit', sans-serif;
      }
    </style>
  </head>
