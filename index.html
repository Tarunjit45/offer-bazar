<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasestorage.googleapis.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer-when-downgrade">
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/logo.jpeg" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- SEO Meta Tags -->
    <title>OfferBazar | India's #1 Site for Loot Alerts & 1 Rs Sales</title>
    <meta name="description" content="Get instant alerts for Amazon loot deals, 1 Rs sales, and Flipkart price errors. Curated deals on Mobiles, Electronics, and Fashion updated every minute." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://offerbazar.xyz/" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- INLINE CRITICAL CSS (LCP Optimization) -->
    <style>
      :root { --bg: #f9fafb; --primary: #f97316; }
      body { background-color: var(--bg); margin: 0; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }
      .initial-loader { display: flex; align-items: center; justify-content: center; height: 100vh; background: white; }
      #root { min-height: 100vh; }
      .header-bg { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #f3f4f6; position: sticky; top: 0; z-index: 50; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
