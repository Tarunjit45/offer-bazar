<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasestorage.googleapis.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer-when-downgrade">
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/logo.jpeg" as="image">

    <!-- SEO Meta Tags -->
    <title>OfferBazar | India's #1 Site for Loot Alerts & 1 Rs Sales</title>
    <meta name="description" content="Get instant alerts for Amazon loot deals, 1 Rs sales, and Flipkart price errors. Curated deals on Mobiles, Electronics, and Fashion updated every minute." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://offerbazar.xyz/" />

    <!-- NO-WAIT SYSTEM FONT STACK (Replaces Outfit for 0ms loading) -->
    <style>
      :root { --bg: #f9fafb; --primary: #f97316; }
      body { 
        background-color: var(--bg); 
        margin: 0; 
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        -webkit-font-smoothing: antialiased; 
        -moz-osx-font-smoothing: grayscale;
      }
      .initial-loader { display: flex; align-items: center; justify-content: center; height: 100vh; background: white; }
      #root { min-height: 100vh; }
      .header-bg { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #f3f4f6; position: sticky; top: 0; z-index: 50; }
      
      /* CRITICAL HERO STYLES (Inline to fix LCP) */
      .hero-section { padding: 3rem 1rem; text-align: center; background: #fff7ed; border-bottom: 1px solid #ffedd5; margin-bottom: 2rem; border-radius: 0 0 3rem 3rem; }
      .hero-title { font-size: 2.5rem; font-weight: 800; line-height: 1.1; color: #111827; letter-spacing: -0.05em; text-transform: uppercase; margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
