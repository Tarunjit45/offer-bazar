<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>OfferBazar | Best Loot Deals, iPhone for 1 Rs & Flash Sales</title>
    <meta name="description" content="OfferBazar: Get the best loot deals in India! Find iPhone for 1 Rs, Laptops under 1000, and crazy flash sales. We curate limited-time offers on Mobiles, Groceries, Fashion & Home items." />
    <meta name="keywords" content="OfferBazar, best loot deals, iphone in 1 rs, laptop in 100, phone in 200, best budget site, flash sale India, limited time offer, buy cheap products, best offer site, lowest price electronics, grocery deals, fashion loot" />
    <meta name="author" content="OfferBazar" />
    
    <!-- Geo Tags for India SEO -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://offerbazar.example.com/" />
    <meta property="og:title" content="OfferBazar | Crazy Loot Deals & 1 Rs Offers" />
    <meta property="og:description" content="Don't miss the Loot! Grab iPhones, Laptops, and gadgets at unbelievable prices. Limited time flash sales updated hourly." />
    <meta property="og:image" content="/logo.jpeg" />

    <!-- Structured Data (Schema.org) for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OfferBazar",
      "url": "https://offerbazar.example.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://offerbazar.example.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "description": "India's best loot deal and flash sale platform."
    }
    </script>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://offerbazar.example.com/" />
    <meta property="twitter:title" content="OfferBazar | Curated Deals & Low Price Finds" />
    <meta property="twitter:description" content="Save more with OfferBazar. We curate the best products at the lowest prices across the web." />
    <meta property="twitter:image" content="/logo.jpeg" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Outfit', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
